# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: LedFx
version: "latest"
slug: ledfx
description: Network based LED effect engine designed to deliver advanced real-time audio effects to a wide variety of devices. 
url: "https://github.com/LedFx/LedFx"
arch:
  - aarch64
  - amd64
init: false
webui: "http://[HOST]:[PORT:8888]"
ports:
  "8888/tcp": 8888
ports_description:
  "8888/tcp": "LedFx web interface"
image: "ledfxorg/ledfx"
